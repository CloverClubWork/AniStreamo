<!DOCTYPE html>

    <style>
      body{
        margin:0;
        padding: 0;
        width: 100%;
      }
      .container{
        max-width: 100%;
        padding: 0;
        margin: 0;
      }
      .icon {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 200, 'opsz' 48
      }
      .vid-container{
        padding-top: 56.25%;
        position: relative;
        overflow: hidden;
      }
      .video-player{
        position: absolute;
        height: 100%;
        width: 100%;
        left: 0px;
        top: 0px;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid p-0">
      <!-- Navigation -->
      <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="javascript:void(0)">AniTube</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
            <span class="navbar-toggler-icon"></span>
         </button>
        <div class="collapse navbar-collapse" id="mynavbar">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="javascript:void(0)">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="javascript:void(0)">Anime List</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="javascript:void(0)">About Us</a>
            </li>
          </ul>
          <form class="d-flex">
            <input class="form-control me-2" type="text" placeholder="Search Anime">
            <button class="btn btn-primary" type="button">Search</button>
          </form>
        </div>
      </div>
    </nav>
    
    <!-- Main Data -->
    <div class="main-data container p-2">
      
      <!-- Alert Message -->
      <div class="alert alert-warning">
        <strong>Noted:</strong>
        <p>We only used limited storage for providing videos here. Please you may find to your heart to support us by donating to expand this storage and post more videos. Thank you</p>
      </div>
      
      <div class="container p-0 bg-white">
        <h3>Recently Updated</h3>
        <!-- List -->
        <ul class="list-group p-0" id="ul">
          <li class="list-group-item p-0">
            <div class="vid-container">
              <iframe frameborder="0" allowfullscreen="" scrolling="no" allow="autoplay;fullscreen" class="video-player" src="https://onelineplayer.com/player.html?autoplay=false&autopause=true&muted=false&loop=false&url=https%3A%2F%2Fwww.dropbox.com%2Fs%2F8192gd3w8qr3j2e%2FMasamune.mp4%3Fraw%3D1&poster=https%3A%2F%2Fi0.wp.com%2Fanitrendz.net%2Fnews%2Fwp-content%2Fuploads%2F2022%2F11%2Fmasamunekunsrevenger_pv1screenshot.png&time=true&progressBar=true&overlay=true&muteButton=true&fullscreenButton=true&style=light&quality=1080p&playButton=true"></iframe>
            </div>

        </ul>
      </div>
      
    </div>
    
    </div>
